kind = "web"
previewPath = "/next-app/"
title = "Credential Vault (Next.js)"
version = "1.0.0"
id = "artifacts/next-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/next-app/" ]
localPort = 22610

[services.development]
run = "PORT=22610 BASE_PATH=/next-app NEXT_PUBLIC_BASE_PATH=/next-app pnpm --filter @workspace/next-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/next-app", "run", "build" ]
run = "PORT=22610 BASE_PATH=/next-app NEXT_PUBLIC_BASE_PATH=/next-app pnpm --filter @workspace/next-app run start"

[services.env]
PORT = "22610"
BASE_PATH = "/next-app"
NEXT_PUBLIC_BASE_PATH = "/next-app"
