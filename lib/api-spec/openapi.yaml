openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: credentials
    description: Credential management
  - name: settings
    description: Admin settings
  - name: stats
    description: Dashboard statistics
  - name: vaults
    description: Vault management
  - name: spaces
    description: Spaces management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Registration disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /credentials:
    get:
      operationId: listCredentials
      tags: [credentials]
      summary: List all credentials
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: spaceId
          in: query
          schema:
            type: integer
        - name: vaultId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Credential list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Credential"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createCredential
      tags: [credentials]
      summary: Create a credential
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCredentialBody"
      responses:
        "201":
          description: Credential created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credential"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /credentials/{id}:
    patch:
      operationId: updateCredential
      tags: [credentials]
      summary: Update a credential
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCredentialBody"
      responses:
        "200":
          description: Credential updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credential"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Credential not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCredential
      tags: [credentials]
      summary: Delete a credential
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Credential deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Credential not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /categories:
    get:
      operationId: listCategories
      tags: [credentials]
      summary: List all categories
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createCategory
      tags: [credentials]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [credentials]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryBody"
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Category not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCategory
      tags: [credentials]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Category deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Category not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /spaces:
    get:
      operationId: listSpaces
      tags: [spaces]
      summary: List all spaces
      responses:
        "200":
          description: Space list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Space"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createSpace
      tags: [spaces]
      summary: Create a space
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSpaceBody"
      responses:
        "201":
          description: Space created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Space"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /spaces/{id}:
    patch:
      operationId: updateSpace
      tags: [spaces]
      summary: Update a space
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSpaceBody"
      responses:
        "200":
          description: Space updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Space"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Space not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSpace
      tags: [spaces]
      summary: Delete a space
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Space deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Space not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get app settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update app settings (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsBody"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /settings/registration-status:
    get:
      operationId: getRegistrationStatus
      tags: [settings]
      summary: Check if registration is enabled (public)
      responses:
        "200":
          description: Registration status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationStatus"

  /vaults:
    get:
      operationId: listVaults
      tags: [vaults]
      summary: List all user vaults
      responses:
        "200":
          description: Vault list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VaultItem"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createVault
      tags: [vaults]
      summary: Create a new vault
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVaultBody"
      responses:
        "201":
          description: Vault created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultItem"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vaults/{id}:
    patch:
      operationId: updateVault
      tags: [vaults]
      summary: Update a vault (name, color, icon)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVaultBody"
      responses:
        "200":
          description: Vault updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultItem"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Vault not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteVault
      tags: [vaults]
      summary: Delete a vault and all its credentials
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Vault deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Vault not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vaults/{id}/verify:
    post:
      operationId: verifyVault
      tags: [vaults]
      summary: Verify vault password or PIN to unlock
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyVaultBody"
      responses:
        "200":
          description: Vault unlocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Vault not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vaults/{id}/lock:
    post:
      operationId: lockVault
      tags: [vaults]
      summary: Lock a vault
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vault locked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vaults/{id}/change-password:
    post:
      operationId: changeVaultPassword
      tags: [vaults]
      summary: Change vault password
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeVaultPasswordBody"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Wrong old password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vaults/{id}/change-pin:
    post:
      operationId: changeVaultPin
      tags: [vaults]
      summary: Change vault PIN
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeVaultPinBody"
      responses:
        "200":
          description: PIN changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Wrong old PIN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    RegisterBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        rememberMe:
          type: boolean
      required:
        - username
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
      required:
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        isAdmin:
          type: boolean
      required:
        - id
        - username
        - isAdmin

    Credential:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        email:
          type: string
        password:
          type: string
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        categoryColor:
          type: ["string", "null"]
        vaultId:
          type: ["integer", "null"]
        spaceId:
          type: ["integer", "null"]
        spaceName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - email
        - password
        - categoryId
        - categoryName
        - categoryColor
        - vaultId
        - spaceId
        - spaceName
        - createdAt
        - updatedAt

    CreateCredentialBody:
      type: object
      properties:
        title:
          type: string
        email:
          type: string
        password:
          type: string
        categoryId:
          type: ["integer", "null"]
        vaultId:
          type: ["integer", "null"]
        spaceId:
          type: ["integer", "null"]
      required:
        - title
        - email
        - password

    UpdateCredentialBody:
      type: object
      properties:
        title:
          type: string
        email:
          type: string
        password:
          type: string
        categoryId:
          type: ["integer", "null"]
        vaultId:
          type: ["integer", "null"]
        spaceId:
          type: ["integer", "null"]

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
        credentialCount:
          type: integer
      required:
        - id
        - name
        - color
        - credentialCount

    CreateCategoryBody:
      type: object
      properties:
        name:
          type: string
        color:
          type: string
      required:
        - name
        - color

    UpdateCategoryBody:
      type: object
      properties:
        name:
          type: string
        color:
          type: string

    Space:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        defaultType:
          type: ["string", "null"]
        color:
          type: string
        icon:
          type: string
        credentialCount:
          type: integer
      required:
        - id
        - name
        - defaultType
        - color
        - icon
        - credentialCount

    CreateSpaceBody:
      type: object
      properties:
        name:
          type: string
        defaultType:
          type: ["string", "null"]
        color:
          type: string
        icon:
          type: string
      required:
        - name

    UpdateSpaceBody:
      type: object
      properties:
        name:
          type: string
        defaultType:
          type: ["string", "null"]
        color:
          type: string
        icon:
          type: string

    VaultItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
        icon:
          type: string
        credentialCount:
          type: integer
        isUnlocked:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - color
        - icon
        - credentialCount
        - isUnlocked
        - createdAt

    CreateVaultBody:
      type: object
      properties:
        name:
          type: string
        password:
          type: string
        pin:
          type: string
        color:
          type: string
        icon:
          type: string
      required:
        - name
        - password
        - pin

    UpdateVaultBody:
      type: object
      properties:
        name:
          type: string
        color:
          type: string
        icon:
          type: string

    VerifyVaultBody:
      type: object
      properties:
        password:
          type: string
        pin:
          type: string

    ChangeVaultPasswordBody:
      type: object
      properties:
        oldPassword:
          type: string
        newPassword:
          type: string
      required:
        - oldPassword
        - newPassword

    ChangeVaultPinBody:
      type: object
      properties:
        oldPin:
          type: string
        newPin:
          type: string
      required:
        - oldPin
        - newPin

    Stats:
      type: object
      properties:
        totalCredentials:
          type: integer
        totalCategories:
          type: integer
        totalSpaces:
          type: integer
        totalVaults:
          type: integer
        recentlyAdded:
          type: integer
        vaultCredentials:
          type: integer
        uniqueTypes:
          type: integer
        oldestCredentialDays:
          type: ["integer", "null"]
        averageAgeDays:
          type: integer
        categoryBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/CategoryStat"
        typeBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/TypeStat"
      required:
        - totalCredentials
        - totalCategories
        - totalSpaces
        - totalVaults
        - recentlyAdded
        - vaultCredentials
        - uniqueTypes
        - oldestCredentialDays
        - averageAgeDays
        - categoryBreakdown
        - typeBreakdown

    CategoryStat:
      type: object
      properties:
        name:
          type: string
        count:
          type: integer
        color:
          type: string
      required:
        - name
        - count
        - color

    TypeStat:
      type: object
      properties:
        type:
          type: string
        count:
          type: integer
      required:
        - type
        - count

    Settings:
      type: object
      properties:
        registrationEnabled:
          type: boolean
        siteTitle:
          type: string
        siteLogo:
          type: string
        siteFavicon:
          type: string
      required:
        - registrationEnabled
        - siteTitle
        - siteLogo
        - siteFavicon

    UpdateSettingsBody:
      type: object
      properties:
        registrationEnabled:
          type: boolean
        siteTitle:
          type: string
        siteLogo:
          type: string
        siteFavicon:
          type: string

    RegistrationStatus:
      type: object
      properties:
        enabled:
          type: boolean
      required:
        - enabled
